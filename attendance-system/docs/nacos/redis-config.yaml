# Redis配置
spring:
  redis:
    host: localhost
    port: 6379
    password: 
    database: 0
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0
    timeout: 3000ms

# 缓存配置
cache:
  # 员工信息缓存时间（小时）
  employee-ttl: 24
  # 考勤规则缓存时间（小时）
  rule-ttl: 24